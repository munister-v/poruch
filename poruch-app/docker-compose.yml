services:
  app:
    build: .
    restart: unless-stopped
    init: true
    read_only: true
    env_file: .env
    environment:
      APP_VERSION: ${APP_VERSION:-local}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3100:3000"
    volumes:
      - poruch_uploads:/app/uploads
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/readyz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - poruch

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - poruch_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poruch -d poruch"]
      interval: 5s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - poruch

volumes:
  poruch_db:
  poruch_uploads:

networks:
  poruch:
